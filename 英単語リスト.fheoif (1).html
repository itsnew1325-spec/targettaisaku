<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英単語帳 Section 1-8 赤シート位置固定版</title>
    <style>
        :root {
            --primary-color: #e74c3c;
            --bg-color: #f8f9fa;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
            --sheet-color: rgba(255, 0, 0, 0.99); 
        }
        body.dark-mode {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --card-bg: #1e1e1e;
            --border-color: #333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding-bottom: 100px;
            user-select: none;
            letter-spacing: 0.05em;
        }

        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #eee;
            z-index: 10002;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #3498db;
            transition: width 0.2s;
        }

        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            padding: 10px; 
        }

        .sticky-header {
            position: sticky;
            top: 6px;
            background: var(--bg-color);
            z-index: 1000;
            padding: 10px;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .header-inner {
            max-width: 500px;
            margin: 0 auto;
        }

        .speed-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.05);
            padding: 8px;
            border-radius: 10px;
        }
        .shuffle-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .shuffle-btn {
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #3498db;
            background: white;
            color: #3498db;
            font-size: 0.85em;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 0.08em;
        }
        .shuffle-btn.active { background: #3498db; color: white; }

        .speed-control-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 50%;
            font-size: 1.1em;
            cursor: pointer;
        }
        .speed-display { font-weight: bold; min-width: 70px; text-align: center; font-size: 0.9em; }
        .stop-btn { padding: 6px 12px; border-radius: 8px; border: 2px solid #e74c3c; background: white; color: #e74c3c; font-weight: bold; cursor: pointer; }
        .stop-btn.active { background: #e74c3c; color: white; }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 5px 0;
            justify-content: center;
        }
        .tab-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: var(--card-bg);
            color: var(--text-color);
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85em;
            letter-spacing: 0.05em;
        }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); table-layout: fixed; }
        th, td { border: 1px solid var(--border-color); padding: 16px 10px; text-align: left; overflow: hidden; }
        th { background: #34495e; color: white; font-size: 0.9em; letter-spacing: 0.2em; text-align: center; }

        .word-no { color: #888; font-size: 0.8em; margin-right: 5px; display: inline-block; width: 25px; letter-spacing: 0; }
        .word-eng { font-weight: bold; cursor: pointer; font-size: 1.1em; letter-spacing: 0.06em; }
        .word-jp { color: #ff0000 !important; font-weight: bold; filter: contrast(200%); letter-spacing: 0.15em; }
        
        .fav-star { cursor: pointer; color: #ccc; font-size: 1.5em; text-align: center; display: block; }
        .fav-star.active { color: #f1c40f; }

        #red-sheet {
            position: fixed;
            top: 250px; /* デフォルト値 */
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 460px;
            height: 600px;
            max-height: 80vh;
            background-color: var(--sheet-color);
            border: 1px solid #900;
            border-radius: 12px;
            z-index: 9999;
            touch-action: none;
            cursor: move;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .mode-fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #34495e;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10001;
        }

        #view-title {
            text-align: center; 
            font-size: 1.3em; 
            letter-spacing: 0.3em; 
            margin: 20px 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div id="progress-container"><div id="progress-bar"></div></div>

<div class="sticky-header">
    <div class="header-inner">
        <div class="speed-panel">
            <button class="stop-btn" id="stop-btn" onclick="toggleStop()">停止</button>
            <button class="speed-control-btn" onclick="adjustSpeed(-0.5)">ー</button>
            <div class="speed-display" id="speed-val">速度: 0.0</div>
            <button class="speed-control-btn" onclick="adjustSpeed(0.5)">＋</button>
        </div>
        <div class="shuffle-panel">
            <button class="shuffle-btn" id="shuffle-on" onclick="setShuffle(true)">🔀 シャッフル</button>
            <button class="shuffle-btn active" id="shuffle-off" onclick="setShuffle(false)">📋 順番通り</button>
        </div>
        <div id="tabs" class="tabs">
            <button class="tab-btn" style="border:2px solid #f1c40f;" id="btn-weak" onclick="showWeak()">🔥 苦手</button>
        </div>
    </div>
</div>

<div id="red-sheet"></div>

<div class="container">
    <h2 id="view-title">Section 1</h2>
    <table>
        <thead>
            <tr>
                <th style="width:15%;">苦手</th>
                <th style="width:45%;">英単語</th>
                <th style="width:40%;">意味</th>
            </tr>
        </thead>
        <tbody id="word-list"></tbody>
    </table>
</div>

<div class="mode-fab" onclick="document.body.classList.toggle('dark-mode')">🌓</div>

let currentIdx = -1; 
let weakWords = JSON.parse(localStorage.getItem('weakWords_v7') || '[]');
let isShuffle = false;
let scrollInterval = null;
let currentSpeed = 0.0;

// タブ生成
const tabsContainer = document.getElementById('tabs');
sections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.innerText = s.name;
    btn.onclick = () => { currentIdx = i; updateView(); };
    tabsContainer.appendChild(btn);
});

window.onscroll = function() { updateProgressBar(); };

function updateProgressBar() {
    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    const scrolled = (winScroll / height) * 100;
    document.getElementById("progress-bar").style.width = (height <= 0 ? 0 : scrolled) + "%";
}

function setShuffle(val) {
    isShuffle = val;
    document.getElementById('shuffle-on').classList.toggle('active', isShuffle);
    document.getElementById('shuffle-off').classList.toggle('active', !isShuffle);
    updateView();
}

function updateView() {
    const title = document.getElementById('view-title');
    const list = document.getElementById('word-list');
    const btns = document.querySelectorAll('.tab-btn');
    
    btns.forEach((b, i) => b.classList.toggle('active', currentIdx === i - 1));
    document.getElementById('btn-weak').classList.toggle('active', currentIdx === -1);
    
    list.innerHTML = '';
    let targetWords = (currentIdx === -1) ? [...weakWords] : [...sections[currentIdx].words];
    title.innerText = (currentIdx === -1) ? "🔥 苦手な単語" : sections[currentIdx].full;

    if (targetWords.length === 0) {
        list.innerHTML = '<tr><td colspan="3" style="text-align:center; padding:100px; letter-spacing:0.1em;">データがありません。</td></tr>';
        document.getElementById("progress-bar").style.width = "0%";
        return;
    }

    if (isShuffle) {
        for (let i = targetWords.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [targetWords[i], targetWords[j]] = [targetWords[j], targetWords[i]];
        }
    }

    targetWords.forEach((w, index) => {
        const tr = document.createElement('tr');
        const isW = weakWords.some(x => x.w === w.w);
        tr.innerHTML = `
            <td><span class="fav-star ${isW ? 'active' : ''}" onclick="toggleWeak('${w.w}', '${w.a}', this)">★</span></td>
            <td class="word-eng" onclick="speak('${w.w}')">
                <span class="word-no">${index + 1}.</span>${w.w}
            </td>
            <td><span class="word-jp">${w.a}</span></td>
        `;
        list.appendChild(tr);
    });
    stopScroll();
    window.scrollTo(0, 0);
    setTimeout(updateProgressBar, 100);
}

function toggleWeak(w, a, el) {
    const idx = weakWords.findIndex(x => x.w === w);
    if (idx > -1) { weakWords.splice(idx, 1); el.classList.remove('active'); }
    else { weakWords.push({w, a}); el.classList.add('active'); }
    localStorage.setItem('weakWords_v7', JSON.stringify(weakWords));
    if (currentIdx === -1) updateView();
}

function showWeak() { currentIdx = -1; updateView(); }

function adjustSpeed(delta) {
    currentSpeed = Math.max(0, currentSpeed + delta);
    updateSpeedUI();
    startScrolling();
}

function toggleStop() {
    currentSpeed = 0;
    updateSpeedUI();
    clearInterval(scrollInterval);
}

function updateSpeedUI() {
    document.getElementById('speed-val').innerText = `速度: ${currentSpeed.toFixed(1)}`;
    document.getElementById('stop-btn').classList.toggle('active', currentSpeed === 0);
}

function startScrolling() {
    clearInterval(scrollInterval);
    if (currentSpeed <= 0) return;
    scrollInterval = setInterval(() => { window.scrollBy(0, 1); }, 50 / currentSpeed);
}

function stopScroll() {
    currentSpeed = 0;
    updateSpeedUI();
    clearInterval(scrollInterval);
}

function speak(t) {
    const u = new SpeechSynthesisUtterance(t);
    u.lang = 'en-US';
    speechSynthesis.speak(u);
}

// --- 赤シート位置保存ロジック ---
const sheet = document.getElementById('red-sheet');
let isDragging = false, offset = {x:0, y:0};

// 保存された位置を読み込む
function loadSheetPosition() {
    const savedPos = localStorage.getItem('redSheetPos');
    if (savedPos) {
        const { top, left } = JSON.parse(savedPos);
        sheet.style.top = top;
        sheet.style.left = left;
        sheet.style.transform = 'none'; // 保存位置を使う場合は中央寄せを解除
    }
}

const moveStart = (e) => {
    isDragging = true;
    const p = e.touches ? e.touches[0] : e;
    const r = sheet.getBoundingClientRect();
    offset.x = p.clientX - r.left;
    offset.y = p.clientY - r.top;
    sheet.style.transform = 'none'; // ドラッグ開始時に中央寄せを解除
};

const move = (e) => {
    if (!isDragging) return;
    const p = e.touches ? e.touches[0] : e;
    const newTop = (p.clientY - offset.y) + 'px';
    const newLeft = (p.clientX - offset.x) + 'px';
    
    sheet.style.top = newTop;
    sheet.style.left = newLeft;
};

const moveEnd = () => {
    if (isDragging) {
        isDragging = false;
        // 位置をlocalStorageに保存
        localStorage.setItem('redSheetPos', JSON.stringify({
            top: sheet.style.top,
            left: sheet.style.left
        }));
    }
};

sheet.addEventListener('mousedown', moveStart);
sheet.addEventListener('touchstart', moveStart, {passive: false});
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', (e) => {
    if (isDragging) e.preventDefault();
    move(e);
}, {passive: false});
window.addEventListener('mouseup', moveEnd);
window.addEventListener('touchend', moveEnd);

// 初回実行
loadSheetPosition();
showWeak();
</script>
